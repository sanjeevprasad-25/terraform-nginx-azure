<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nginx Web Server</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f6f9;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            text-align: center;
            background: #ffffff;
            padding: 2.5rem;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            max-width: 500px;
            width: 100%;
        }
        h1 {
            color: #0078d4; /* Azure Blue */
            margin-bottom: 0.5rem;
        }
        p {
            font-size: 1.1rem;
            color: #666;
        }
        .status {
            display: inline-block;
            background-color: #d4edda;
            color: #155724;
            padding: 0.5rem 1rem;
            border-radius: 50px;
            font-weight: bold;
            margin-top: 1rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Nginx Deployment</h1>
        <p>Web server is running successfully on Azure.</p>
	<p>Containerized Nginx website deployed using Jenkins, Terraform, Docker and Azure.</p>
        <div class="status">✓ Active & Replicated</div>
    </div>
</body>
</html>
